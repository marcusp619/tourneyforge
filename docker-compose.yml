# TourneyForge — Local Development Services
#
# Replaces cloud services so the app runs fully offline:
#   Neon PostgreSQL  → postgres  (port 5432)
#   Upstash Redis    → redis     (port 6379)
#   Cloudflare R2    → minio     (port 9000 API, 9001 console)
#   Resend           → mailpit   (port 1025 SMTP, 8025 web UI)
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose down           # stop all services
#   docker compose down -v        # stop and wipe all volumes

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tourneyforge
      POSTGRES_USER: tf
      POSTGRES_PASSWORD: tfpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tf -d tourneyforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/tourneyforge --ignore-existing &&
        mc anonymous set public local/tourneyforge &&
        echo 'MinIO bucket ready'
      "
    restart: on-failure

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to view emails
    environment:
      MP_MAX_MESSAGES: 200
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

volumes:
  postgres_data:
  minio_data:
  mailpit_data:
